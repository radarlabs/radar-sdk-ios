included:
  - RadarSDK
  - RadarSDKTests

excluded:
  - Carthage
  - Example
  - RadarSDKFraud
  - RadarSDKIndoors
  - RadarSDKMotion
  - .build

disabled_rules:
  - todo
  - trailing_comma  # swift-format adds trailing commas; conflict with swiftlint --fix
  - opening_brace   # swift-format puts braces on new lines for long signatures

line_length:
  warning: 200
  error: 250
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

identifier_name:
  excluded:
    - r
    - g
    - b
    - a
    - x
    - y
    - z
    - id

reporter: "xcode"
