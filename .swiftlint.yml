included:
  - RadarSDK
  - RadarSDKTests

excluded:
  - Carthage
  - Example/Pods
  - RadarSDKFraud
  - RadarSDKIndoors
  - RadarSDKMotion
  - .build

disabled_rules:
  - todo

line_length:
  warning: 200
  error: 250
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

identifier_name:
  excluded:
    - r
    - g
    - b
    - a
    - x
    - y
    - z
    - id

reporter: "xcode"
